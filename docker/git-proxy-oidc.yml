# git-proxy-java OIDC auth configuration.
# Loaded when GITPROXY_CONFIG_PROFILES includes "oidc" (after "docker-default").
#
# Uses navikt/mock-oauth2-server: accepts any username (no password required at the login form).
#
# ── One-time /etc/hosts setup ─────────────────────────────────────────────────
# mock-oauth2-server derives its issuer URL from the incoming request's Host header.
# For the issuer to be consistent between git-proxy-java (Docker DNS) and your browser
# (host network), both must use the same hostname.  Add to /etc/hosts:
#
#   127.0.0.1  mock-oauth2
#
# Linux/Mac: /etc/hosts   Windows: C:\Windows\System32\drivers\etc\hosts
# ──────────────────────────────────────────────────────────────────────────────

auth:
  provider: oidc
  oidc:
    # issuer-uri drives the browser-facing authorization redirect only.
    issuer-uri: http://mock-oauth2:9090/default
#    client-id: gitproxy-client
#    client-secret: gitproxy-secret
    # Server-side endpoints use host.containers.internal (Podman's automatic host alias)
    # to reach the port-mapped mock-oauth2 container. This avoids the Podman /etc/hosts
    # injection problem where mock-oauth2 resolves to 127.0.0.1 inside containers.
    # jwk-set-uri also skips OIDC discovery at startup (no eager connection on boot).
    jwk-set-uri: http://host.containers.internal:9090/default/jwks
    token-uri: http://host.containers.internal:9090/default/token
    user-info-uri: http://host.containers.internal:9090/default/userinfo
  groups-claim: groups
  role-mappings:
    ADMIN:
      - git_proxy_admins

# Repo permissions for OIDC test users.
# Mirrors docker-default: testuser pushes, admin approves via dashboard.
permissions:
  - username: testuser
    provider: gitea
    match:
      target: SLUG
      value: /test-owner/test-repo
      type: LITERAL
    operations: PUSH
  - username: testuser
    provider: gitea
    match:
      target: OWNER
      value: otherorg
      type: GLOB
    operations: PUSH
  - username: admin
    provider: gitea
    match:
      target: SLUG
      value: /test-owner/test-repo
      type: LITERAL
    operations: REVIEW
  - username: admin
    provider: gitea
    match:
      target: OWNER
      value: otherorg
      type: GLOB
    operations: REVIEW
