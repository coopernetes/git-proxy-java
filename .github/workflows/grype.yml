name: Container Scan

permissions:
  contents: read
  security-events: write

on:
  workflow_call:
    inputs:
      image:
        description: "Image reference to scan (digest preferred)"
        required: true
        type: string
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  grype:
    name: Grype / Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Scan image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # ratchet:anchore/scan-action@v7
        id: scan
        with:
          image: ${{ inputs.image || 'ghcr.io/coopernetes/git-proxy-java:latest' }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          config: .grype.yaml

      - name: Upload SARIF report
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # ratchet:github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
