name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: CI / Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: npm
          cache-dependency-path: git-proxy-java-dashboard/frontend/package-lock.json

      - name: Build and test
        run: ./gradlew build

      - name: Verify coverage thresholds
        run: ./gradlew jacocoTestCoverageVerification

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: test-reports
          path: "**/build/reports/tests/test/"
          retention-days: 14

      - name: Publish JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: jacoco-reports
          path: "**/build/reports/jacoco/"
          retention-days: 14

  docker-smoke-test:
    name: CI / Docker Smoke Test (${{ matrix.db }})
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request'
    strategy:
      matrix:
        db: [default, postgres, mongo]
        # auth: [ldap, oidc]  # Uncomment when auth smoke tests are added
      fail-fast: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Build and start stack
        env:
          DB: ${{ matrix.db }}
        run: |
          if [[ "$DB" != "default" ]]; then
            bash compose.sh --db "$DB" -- up -d --build
          else
            bash compose.sh -- up -d --build
          fi
        timeout-minutes: 10

      - name: Wait for proxy health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null; then
              echo "Proxy healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8080/api/health

      - name: Seed Gitea
        run: bash docker/gitea-setup.sh

      - name: Run proxy smoke tests
        run: |
          source test/gitea/tokens.env
          export GIT_PASSWORD="${GITEA_TESTUSER_TOKEN}"
          export GIT_USERNAME="me"
          export GIT_REPO="gitea/test-owner/test-repo.git"
          export GIT_AUTHOR_NAME="test-user"
          export GIT_EMAIL="testuser@example.com"
          # Proxy mode only — store-and-forward passes queue for approval and hang
          bash test/proxy-pass.sh
          bash test/proxy-fail-secrets.sh

      - name: Dump proxy logs on failure
        if: failure()
        env:
          DB: ${{ matrix.db }}
        run: |
          if [[ "$DB" != "default" ]]; then
            bash compose.sh --db "$DB" -- logs git-proxy-java
          else
            bash compose.sh -- logs git-proxy-java
          fi

  dependency-submission:
    name: CI / Dependency Submission
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # ratchet:gradle/actions/dependency-submission@v6

  e2e-test:
    name: CI / E2E Test
    runs-on: ubuntu-latest
    # E2E tests spin up containers; only run on push/PR to the main branches
    # to avoid burning minutes on every feature branch commit.
    if: >
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/jetty' ||
      github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # ratchet:actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run e2e tests
        run: ./gradlew :git-proxy-java-server:e2eTest
        timeout-minutes: 5

      - name: Publish e2e test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: e2e-test-reports
          path: "git-proxy-java-server/build/reports/tests/e2eTest/"
          retention-days: 14
